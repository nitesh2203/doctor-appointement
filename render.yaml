# Render Blueprint — deploy both services from the Render dashboard:
# Dashboard → New → Blueprint → connect this repo
#
# Creates:
#   medibook-api  — Node/Express backend (Web Service)
#   medibook-web  — React frontend (Static Site)

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: medibook-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: medibook-web
          property: host

  # ── React frontend (static) ──────────────────────────────────
  - type: web
    name: medibook-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: medibook-api
          envVarKey: RENDER_EXTERNAL_URL
