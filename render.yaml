# Render Blueprint — single Web Service (API + React UI on one URL)
# Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: medibook
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CI
        value: "false"
      - key: JWT_SECRET
        generateValue: true
